<!DOCTYPE html>
<html>
<head>
    <title>Azure Cognitive Services MCQ Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
        }
        h1 {
            text-align: center;
        }
        .question {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Azure Cognitive Services - Multiple Select MCQ</h1>

<form id="quizForm">

<div id="questions"></div>

<button type="button" onclick="calculateScore()">Submit Quiz</button>

</form>

<div id="result"></div>

<script>

const quizData = [
{
q: "1. Azure Knowledge Mining is used for:",
options: ["Extracting insights from large documents",
          "Building search solutions",
          "Managing virtual machines",
          "Data enrichment using AI"],
correct: [0,1,3]
},
{
q: "2. Azure Cognitive Search can:",
options: ["Index documents",
          "Perform semantic search",
          "Host websites",
          "Use AI enrichment"],
correct: [0,1,3]
},
{
q: "3. Face Service can:",
options: ["Detect faces in images",
          "Recognize identities",
          "Analyze facial attributes",
          "Translate text"],
correct: [0,1,2]
},
{
q: "4. Face API supports:",
options: ["Emotion detection",
          "Face verification",
          "Face grouping",
          "Speech synthesis"],
correct: [0,1,2]
},
{
q: "5. Speech Service can:",
options: ["Speech to Text",
          "Text to Speech",
          "Speech Translation",
          "Image classification"],
correct: [0,1,2]
},
{
q: "6. Translator service supports:",
options: ["Text translation",
          "Language detection",
          "Custom translation models",
          "Face detection"],
correct: [0,1,2]
},
{
q: "7. Text Analytics provides:",
options: ["Sentiment analysis",
          "Key phrase extraction",
          "Named entity recognition",
          "Image tagging"],
correct: [0,1,2]
},
{
q: "8. Named Entity Recognition detects:",
options: ["People names",
          "Locations",
          "Organizations",
          "Image colors"],
correct: [0,1,2]
},
{
q: "9. Sentiment analysis identifies:",
options: ["Positive opinion",
          "Negative opinion",
          "Neutral opinion",
          "Audio pitch"],
correct: [0,1,2]
},
{
q: "10. Speech Studio allows:",
options: ["Testing speech models",
          "Custom voice creation",
          "Deploying virtual machines",
          "Speech model training"],
correct: [0,1,3]
},
{
q: "11. Azure Cognitive Services are:",
options: ["Cloud-based APIs",
          "AI-powered services",
          "Hardware devices",
          "Pre-trained models"],
correct: [0,1,3]
},
{
q: "12. Knowledge Mining involves:",
options: ["AI enrichment pipeline",
          "Indexing data",
          "Extracting structured data",
          "Gaming engine"],
correct: [0,1,2]
},
{
q: "13. Face verification is used to:",
options: ["Confirm same person",
          "Match two images",
          "Translate language",
          "Detect identity similarity"],
correct: [0,1,3]
},
{
q: "14. Speech translation converts:",
options: ["Speech to speech",
          "Speech to text in another language",
          "Text to speech",
          "Images to audio"],
correct: [0,1]
},
{
q: "15. Text Analytics supports:",
options: ["Language detection",
          "PII detection",
          "Sentiment scoring",
          "Video editing"],
correct: [0,1,2]
},
{
q: "16. Custom Translator helps:",
options: ["Train domain-specific translation",
          "Improve translation accuracy",
          "Face grouping",
          "Custom speech model integration"],
correct: [0,1]
},
{
q: "17. Azure AI services require:",
options: ["API key",
          "Endpoint URL",
          "Local GPU",
          "Azure subscription"],
correct: [0,1,3]
},
{
q: "18. Knowledge Mining uses:",
options: ["Cognitive Search",
          "AI enrichment",
          "Indexers",
          "Manual sorting only"],
correct: [0,1,2]
},
{
q: "19. Speech Service supports:",
options: ["Real-time transcription",
          "Batch transcription",
          "Custom speech models",
          "Database hosting"],
correct: [0,1,2]
},
{
q: "20. Text Analytics for Health extracts:",
options: ["Medical conditions",
          "Medications",
          "Healthcare entities",
          "Video metadata"],
correct: [0,1,2]
}
];

const container = document.getElementById("questions");

quizData.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<p>${item.q}</p>`;
    item.options.forEach((option, i) => {
        div.innerHTML += `<input type="checkbox" name="q${index}" value="${i}"> ${option}<br>`;
    });
    container.appendChild(div);
});

function calculateScore() {
    let score = 0;

    quizData.forEach((item, index) => {
        let selected = Array.from(document.querySelectorAll(`input[name="q${index}"]:checked`))
                        .map(el => parseInt(el.value))
                        .sort();

        let correct = item.correct.slice().sort();

        if (JSON.stringify(selected) === JSON.stringify(correct)) {
            score++;
        }
    });

    document.getElementById("result").innerHTML =
        "Your Score: " + score + " / " + quizData.length;
}

</script>

</body>
</html>
