<!DOCTYPE html>
<html>
<head>
    <title>AI & Generative AI - Professional Drag & Drop Exam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: linear-gradient(to right, #eef2f7, #d9e4f5);
        }
        h1 { text-align: center; }

        .timer {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: red;
            margin-bottom: 20px;
        }

        .question {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .option {
            padding: 8px 12px;
            background: #2196F3;
            color: white;
            border-radius: 5px;
            cursor: grab;
        }

        .dropzone {
            padding: 12px;
            border: 2px dashed #aaa;
            min-height: 40px;
            border-radius: 5px;
            background: #fafafa;
        }

        .correct { background-color: #d4edda !important; }
        .wrong { background-color: #f8d7da !important; }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #0078D4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            font-size: 22px;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }

        .pass { color: green; }
        .fail { color: red; }

    </style>
</head>
<body>

<h1>AI, Generative AI & LLM - Drag & Drop Exam</h1>

<div class="timer">
Time Left: <span id="time">15:00</span>
</div>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>
<div id="result"></div>

<script>

// TIMER (15 minutes)
let timeLeft = 900;
let timer = setInterval(function(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("time").innerText =
        (minutes < 10 ? "0" : "") + minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    timeLeft--;

    if(timeLeft < 0){
        clearInterval(timer);
        submitQuiz();
        alert("Time is up! Quiz auto-submitted.");
    }
}, 1000);


// QUIZ DATA
const quizData = [
{q:"1. AI mainly focuses on:", options:["Human-like intelligence","Web hosting","Data storage","Hardware repair"], correct:"Human-like intelligence"},
{q:"2. Generative AI is used to:", options:["Generate new content","Clean hardware","Compress files","Install OS"], correct:"Generate new content"},
{q:"3. LLM stands for:", options:["Large Language Model","Low Level Memory","Logical Learning Machine","Linear Logistic Model"], correct:"Large Language Model"},
{q:"4. Transformer models use:", options:["Attention mechanism","Sorting algorithm","Database indexing","Binary search"], correct:"Attention mechanism"},
{q:"5. Tokenization means:", options:["Breaking text into tokens","Encrypting data","Deleting words","Compressing files"], correct:"Breaking text into tokens"},
{q:"6. Embeddings represent:", options:["Text as vectors","Audio cables","Hardware parts","File permissions"], correct:"Text as vectors"},
{q:"7. GPT models are based on:", options:["Transformer architecture","CNN only","Decision Trees","KNN"], correct:"Transformer architecture"},
{q:"8. Generative AI differs from traditional AI because it:", options:["Creates new content","Only classifies data","Stores data","Deletes files"], correct:"Creates new content"},
{q:"9. Self-attention helps model:", options:["Word relationships","Hardware speed","File size","RAM usage"], correct:"Word relationships"},
{q:"10. Fine-tuning improves:", options:["Model performance on specific tasks","Internet speed","CPU cooling","Disk storage"], correct:"Model performance on specific tasks"},
{q:"11. Prompt engineering is about:", options:["Designing input instructions","Fixing hardware","Coding operating systems","Repairing GPU"], correct:"Designing input instructions"},
{q:"12. Large datasets help LLMs:", options:["Learn language patterns","Reduce storage","Delete tokens","Remove embeddings"], correct:"Learn language patterns"},
{q:"13. Embedding similarity is measured using:", options:["Cosine similarity","CPU speed","RAM size","IP address"], correct:"Cosine similarity"},
{q:"14. Transformers replaced:", options:["RNNs in many NLP tasks","Hard drives","Monitors","Printers"], correct:"RNNs in many NLP tasks"},
{q:"15. Generative AI can create:", options:["Text, images, audio","Only numbers","Only databases","Only networks"], correct:"Text, images, audio"},
{q:"16. Context window refers to:", options:["Amount of text model remembers","Computer screen size","Browser tab","RAM stick"], correct:"Amount of text model remembers"},
{q:"17. Zero-shot learning means:", options:["No task-specific training","Zero GPU","No dataset","No model"], correct:"No task-specific training"},
{q:"18. Pre-training is done on:", options:["Large general datasets","Tiny local files","Printer logs","Mouse clicks"], correct:"Large general datasets"},
{q:"19. Overfitting occurs when model:", options:["Memorizes training data","Deletes data","Runs faster","Uses less RAM"], correct:"Memorizes training data"},
{q:"20. AI ethics focuses on:", options:["Responsible AI use","Hardware sales","Battery charging","Network cables"], correct:"Responsible AI use"}
];

const quizContainer = document.getElementById("quiz");

quizData.forEach((item, index) => {

    const div = document.createElement("div");
    div.className = "question";
    div.id = "qbox" + index;

    div.innerHTML = `<p>${item.q}</p>`;

    const optionsDiv = document.createElement("div");
    optionsDiv.className = "options";

    item.options.sort(() => Math.random() - 0.5);

    item.options.forEach(option => {
        const opt = document.createElement("div");
        opt.className = "option";
        opt.draggable = true;
        opt.innerText = option;
        opt.addEventListener("dragstart", dragStart);
        optionsDiv.appendChild(opt);
    });

    const dropzone = document.createElement("div");
    dropzone.className = "dropzone";
    dropzone.dataset.correct = item.correct;
    dropzone.addEventListener("dragover", e => e.preventDefault());
    dropzone.addEventListener("drop", drop);

    div.appendChild(optionsDiv);
    div.appendChild(dropzone);
    quizContainer.appendChild(div);
});

function dragStart(e) {
    e.dataTransfer.setData("text", e.target.innerText);
}

function drop(e) {
    e.preventDefault();
    if (e.target.innerText !== "") return;
    const data = e.dataTransfer.getData("text");
    e.target.innerText = data;
}

function submitQuiz() {
    clearInterval(timer);

    let score = 0;

    quizData.forEach((item, index) => {
        const zone = document.querySelector(`#qbox${index} .dropzone`);

        if (zone.innerText === item.correct) {
            score++;
            zone.classList.add("correct");
        } else {
            zone.classList.add("wrong");
        }
    });

    let percentage = (score / quizData.length) * 100;
    let grade = percentage >= 50 ? "PASS" : "FAIL";
    let gradeClass = percentage >= 50 ? "pass" : "fail";

    document.getElementById("result").innerHTML =
        "Score: " + score + " / " + quizData.length +
        "<br>Percentage: " + percentage.toFixed(2) + "%" +
        "<br><span class='" + gradeClass + "'>Result: " + grade + "</span>";
}

</script>

</body>
</html>
