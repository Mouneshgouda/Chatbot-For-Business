<!DOCTYPE html>
<html>
<head>
    <title>Azure AI Services - Professional True/False Exam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: linear-gradient(to right, #eef2f7, #d9e4f5);
        }

        h1 { text-align: center; }

        .timer {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: red;
            margin-bottom: 20px;
        }

        .question {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .correct { background-color: #d4edda !important; }
        .wrong { background-color: #f8d7da !important; }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            background: #0078D4;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #result {
            font-size: 22px;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }

        .pass { color: green; }
        .fail { color: red; }

    </style>
</head>
<body>

<h1>Azure AI Services - True/False Exam</h1>

<div class="timer">
Time Left: <span id="time">15:00</span>
</div>

<form id="quizForm">
<div id="questions"></div>
<button type="button" onclick="submitQuiz()">Submit Quiz</button>
</form>

<div id="result"></div>

<script>

// TIMER (15 Minutes)
let timeLeft = 900;
let timer = setInterval(function(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("time").innerText =
        (minutes < 10 ? "0" : "") + minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    timeLeft--;

    if(timeLeft < 0){
        clearInterval(timer);
        submitQuiz();
        alert("Time is up! Quiz auto-submitted.");
    }
}, 1000);


// QUIZ DATA
const quizData = [
{q:"1. Azure Form Recognizer extracts key-value pairs from documents.", a:true},
{q:"2. Form Recognizer cannot process invoices.", a:false},
{q:"3. LUIS is used for natural language understanding.", a:true},
{q:"4. LUIS is mainly used for image classification.", a:false},
{q:"5. Azure Bot Service helps build conversational bots.", a:true},
{q:"6. Azure Bot Service replaces Azure Machine Learning.", a:false},
{q:"7. Azure Machine Learning allows model training and deployment.", a:true},
{q:"8. Azure Machine Learning is only for data storage.", a:false},
{q:"9. Computer Vision can detect objects in images.", a:true},
{q:"10. Computer Vision cannot read printed text.", a:false},
{q:"11. Form Recognizer supports custom model training.", a:true},
{q:"12. LUIS models require intents and entities.", a:true},
{q:"13. Azure Bot Service supports multiple channels like Teams and Web Chat.", a:true},
{q:"14. Azure Machine Learning does not support AutoML.", a:false},
{q:"15. Computer Vision provides image tagging features.", a:true},
{q:"16. Form Recognizer only works with handwritten notes.", a:false},
{q:"17. LUIS helps bots understand user intent.", a:true},
{q:"18. Azure Bot Service can integrate with Cognitive Services.", a:true},
{q:"19. Azure Machine Learning requires an Azure subscription.", a:true},
{q:"20. Computer Vision is used for speech recognition.", a:false}
];

const container = document.getElementById("questions");

quizData.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "question";
    div.id = "qbox" + index;

    div.innerHTML = `
        <p>${item.q}</p>
        <label><input type="radio" name="q${index}" value="true"> True</label>
        <label><input type="radio" name="q${index}" value="false"> False</label>
    `;
    container.appendChild(div);
});

function submitQuiz() {
    clearInterval(timer);
    let score = 0;

    quizData.forEach((item, index) => {
        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        let questionBox = document.getElementById("qbox" + index);

        if (selected && selected.value === item.a.toString()) {
            score++;
            questionBox.classList.add("correct");
        } else {
            questionBox.classList.add("wrong");
        }

        // Disable further changes
        let radios = document.querySelectorAll(`input[name="q${index}"]`);
        radios.forEach(r => r.disabled = true);
    });

    let percentage = (score / quizData.length) * 100;
    let grade = percentage >= 50 ? "PASS" : "FAIL";
    let gradeClass = percentage >= 50 ? "pass" : "fail";

    document.getElementById("result").innerHTML =
        "Score: " + score + " / " + quizData.length +
        "<br>Percentage: " + percentage.toFixed(2) + "%" +
        "<br><span class='" + gradeClass + "'>Result: " + grade + "</span>";
}

</script>

</body>
</html>
