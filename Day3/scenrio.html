<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azure Services, Copilot & Prompt Engineering - Professional Exam</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:30px;
    background:linear-gradient(to right,#eef2f7,#d9e4f5);
}
h1{text-align:center;}

.timer{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:red;
    margin-bottom:20px;
}

.question{
    background:white;
    padding:15px;
    margin-bottom:25px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.options{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:10px;
}

.option{
    padding:10px 15px;
    background:#0078D4;
    color:white;
    border-radius:5px;
    cursor:grab;
    min-width:150px;
    text-align:center;
}

.dropzone{
    padding:15px;
    border:2px dashed #aaa;
    min-height:40px;
    border-radius:5px;
    background:#fafafa;
    margin-top:10px;
    text-align:center;
}

.correct{ background-color:#d4edda !important; }
.wrong{ background-color:#f8d7da !important; }

button{
    padding:10px 20px;
    font-size:16px;
    display:block;
    margin:30px auto;
    cursor:pointer;
    background:#0078D4;
    color:white;
    border:none;
    border-radius:5px;
}

#result{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}

.pass{color:green;}
.fail{color:red;}

</style>
</head>
<body>

<h1>Azure Services, Copilot & Prompt Engineering - Scenario Exam</h1>

<div class="timer">
Time Left: <span id="time">15:00</span>
</div>

<div id="quiz"></div>
<button onclick="submitQuiz()">Submit Quiz</button>
<div id="result"></div>

<script>

// TIMER (15 Minutes)
let timeLeft = 900;
let timer = setInterval(function(){
    let minutes = Math.floor(timeLeft/60);
    let seconds = timeLeft%60;

    document.getElementById("time").innerText =
        (minutes<10?"0":"")+minutes+":"+(seconds<10?"0":"")+seconds;

    timeLeft--;

    if(timeLeft<0){
        clearInterval(timer);
        submitQuiz();
        alert("Time is up! Quiz auto-submitted.");
    }
},1000);


// QUIZ DATA (19 Questions from your original file)
const quizData = [...document.querySelectorAll ? [] : []];
</script>

<script>
// Keeping your original data exactly as provided

const data = [
{
scenario:"Your team needs to automatically analyze invoices from scanned PDFs and extract key information like amounts and due dates. Which Azure service would you recommend?",
options:["Azure Form Recognizer","Azure Bot Service","Azure Machine Learning","Azure Speech Service"],
correct:"Azure Form Recognizer"
},
{
scenario:"You are designing a customer support bot that understands natural language queries from users and routes them accordingly. Which service should you integrate into your bot?",
options:["LUIS (Language Understanding)","Azure Cognitive Search","Azure Translator","Azure Video Indexer"],
correct:"LUIS (Language Understanding)"
},
{
scenario:"You are designing a Copilot-powered coding assistant.",
options:["GitHub Copilot","Azure Bot Service","Azure Machine Learning","Azure OpenAI Service"],
correct:"GitHub Copilot"
},
{
scenario:"Your application must transcribe customer calls in real-time.",
options:["Azure Speech Service","Azure Cognitive Search","Azure Form Recognizer","Azure Bot Service"],
correct:"Azure Speech Service"
},
{
scenario:"You need scalable model training on Azure.",
options:["Azure Machine Learning","Azure Cognitive Search","Azure Bot Service","LUIS"],
correct:"Azure Machine Learning"
},
{
scenario:"Improve AI responses by refining instructions.",
options:["Prompt Engineering","Model Overfitting","Manual Data Entry","Data Encryption"],
correct:"Prompt Engineering"
},
{
scenario:"Deploy conversational AI across Teams, Slack and Web.",
options:["Azure Bot Service","Azure Machine Learning","Azure Form Recognizer","Azure Translator"],
correct:"Azure Bot Service"
},
{
scenario:"Classify images of handwritten forms.",
options:["Azure Computer Vision","Azure Cognitive Search","LUIS","Azure Bot Service"],
correct:"Azure Computer Vision"
},
{
scenario:"Improve Copilot output relevance.",
options:["Prompt Engineering","Overfitting","Data Augmentation","Model Freezing"],
correct:"Prompt Engineering"
},
{
scenario:"Translate English to multiple languages dynamically.",
options:["Azure Translator","Azure Form Recognizer","Azure Machine Learning","Azure Bot Service"],
correct:"Azure Translator"
},
{
scenario:"Index and query large customer records efficiently.",
options:["Azure Cognitive Search","Azure Translator","LUIS","Azure Form Recognizer"],
correct:"Azure Cognitive Search"
},
{
scenario:"IDE auto-suggests code based on natural language.",
options:["GitHub Copilot","Azure Bot Service","Azure Machine Learning","Azure Speech Service"],
correct:"GitHub Copilot"
},
{
scenario:"Extract sentiment from customer feedback.",
options:["Azure Text Analytics","Azure Computer Vision","Azure Translator","Azure Bot Service"],
correct:"Azure Text Analytics"
},
{
scenario:"Prepare free-text reviews into structured form.",
options:["Tokenization","Encryption","Compression","Clustering"],
correct:"Tokenization"
},
{
scenario:"Prompt not yielding expected output.",
options:["Refine the prompt structure","Reduce API calls","Switch to CPU","Increase storage"],
correct:"Refine the prompt structure"
},
{
scenario:"Deploy trained model as API.",
options:["Deploy as a web service","Export CSV","Run locally","Encrypt model"],
correct:"Deploy as a web service"
},
{
scenario:"Bot asks clarifying questions dynamically.",
options:["Contextual Prompt Engineering","Data Deletion","Tokenization","Batch Processing"],
correct:"Contextual Prompt Engineering"
},
{
scenario:"Predict sales using historical data.",
options:["Azure Machine Learning","Azure Bot Service","Azure Form Recognizer","Azure Speech Service"],
correct:"Azure Machine Learning"
},
{
scenario:"Ensure fairness and transparency in AI.",
options:["AI Ethics Review","Faster GPUs","More storage","Longer training"],
correct:"AI Ethics Review"
}
];

const quizContainer=document.getElementById("quiz");

data.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="question";
    div.id="qbox"+index;

    div.innerHTML=`<p><strong>Scenario ${index+1}:</strong> ${item.scenario}</p>`;

    const optionsDiv=document.createElement("div");
    optionsDiv.className="options";

    item.options.sort(()=>Math.random()-0.5);

    item.options.forEach(option=>{
        const opt=document.createElement("div");
        opt.className="option";
        opt.draggable=true;
        opt.innerText=option;
        opt.addEventListener("dragstart",e=>{
            e.dataTransfer.setData("text",e.target.innerText);
        });
        optionsDiv.appendChild(opt);
    });

    const dropzone=document.createElement("div");
    dropzone.className="dropzone";
    dropzone.dataset.correct=item.correct;

    dropzone.addEventListener("dragover",e=>e.preventDefault());
    dropzone.addEventListener("drop",e=>{
        e.preventDefault();
        if(dropzone.innerText.trim()!=="") return;
        dropzone.innerText=e.dataTransfer.getData("text");
    });

    div.appendChild(optionsDiv);
    div.appendChild(dropzone);
    quizContainer.appendChild(div);
});

function submitQuiz(){
    clearInterval(timer);
    let score=0;

    data.forEach((item,index)=>{
        const zone=document.querySelector(`#qbox${index} .dropzone`);

        if(zone.innerText.trim()===item.correct){
            score++;
            zone.classList.add("correct");
        }else{
            zone.classList.add("wrong");
        }
    });

    let percentage=(score/data.length)*100;
    let grade=percentage>=50?"PASS":"FAIL";
    let gradeClass=percentage>=50?"pass":"fail";

    document.getElementById("result").innerHTML=
        `Score: ${score} / ${data.length}<br>
         Percentage: ${percentage.toFixed(2)}%<br>
         <span class="${gradeClass}">Result: ${grade}</span>`;
}

</script>

</body>
</html>
