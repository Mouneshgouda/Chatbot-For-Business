<!DOCTYPE html>
<html>
<head>
    <title>Azure Cognitive Services - Professional Exam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: linear-gradient(to right, #eef2f7, #d9e4f5);
        }
        h1 { text-align: center; }
        .timer {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: red;
            margin-bottom: 20px;
        }
        .question {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .correct { background-color: #d4edda; }
        .wrong { background-color: #f8d7da; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #0078D4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #result {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>

<h1>Azure Cognitive Services - Multiple Select MCQ</h1>

<div class="timer">
Time Left: <span id="time">15:00</span>
</div>

<form id="quizForm">
<div id="questions"></div>
<br>
<button type="submit">Submit Quiz</button>
</form>

<div id="result"></div>

<script>

// 15-minute timer
let timeLeft = 900;
let timer = setInterval(function(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("time").innerText =
        (minutes < 10 ? "0" : "") + minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    timeLeft--;

    if(timeLeft < 0){
        clearInterval(timer);
        submitQuiz();
        alert("Time is up! Quiz auto-submitted.");
    }
}, 1000);


// QUIZ DATA
const quizData = [ /* your same 20 questions here */
{
q: "1. Azure Knowledge Mining is used for:",
options: ["Extracting insights from large documents","Building search solutions","Managing virtual machines","Data enrichment using AI"],
correct: [0,1,3]
},
{
q: "2. Azure Cognitive Search can:",
options: ["Index documents","Perform semantic search","Host websites","Use AI enrichment"],
correct: [0,1,3]
},
{
q: "3. Face Service can:",
options: ["Detect faces in images","Recognize identities","Analyze facial attributes","Translate text"],
correct: [0,1,2]
},
{
q: "4. Face API supports:",
options: ["Emotion detection","Face verification","Face grouping","Speech synthesis"],
correct: [0,1,2]
},
{
q: "5. Speech Service can:",
options: ["Speech to Text","Text to Speech","Speech Translation","Image classification"],
correct: [0,1,2]
},
{
q: "6. Translator service supports:",
options: ["Text translation","Language detection","Custom translation models","Face detection"],
correct: [0,1,2]
},
{
q: "7. Text Analytics provides:",
options: ["Sentiment analysis","Key phrase extraction","Named entity recognition","Image tagging"],
correct: [0,1,2]
},
{
q: "8. Named Entity Recognition detects:",
options: ["People names","Locations","Organizations","Image colors"],
correct: [0,1,2]
},
{
q: "9. Sentiment analysis identifies:",
options: ["Positive opinion","Negative opinion","Neutral opinion","Audio pitch"],
correct: [0,1,2]
},
{
q: "10. Speech Studio allows:",
options: ["Testing speech models","Custom voice creation","Deploying virtual machines","Speech model training"],
correct: [0,1,3]
},
{
q: "11. Azure Cognitive Services are:",
options: ["Cloud-based APIs","AI-powered services","Hardware devices","Pre-trained models"],
correct: [0,1,3]
},
{
q: "12. Knowledge Mining involves:",
options: ["AI enrichment pipeline","Indexing data","Extracting structured data","Gaming engine"],
correct: [0,1,2]
},
{
q: "13. Face verification is used to:",
options: ["Confirm same person","Match two images","Translate language","Detect identity similarity"],
correct: [0,1,3]
},
{
q: "14. Speech translation converts:",
options: ["Speech to speech","Speech to text in another language","Text to speech","Images to audio"],
correct: [0,1]
},
{
q: "15. Text Analytics supports:",
options: ["Language detection","PII detection","Sentiment scoring","Video editing"],
correct: [0,1,2]
},
{
q: "16. Custom Translator helps:",
options: ["Train domain-specific translation","Improve translation accuracy","Face grouping","Custom speech model integration"],
correct: [0,1]
},
{
q: "17. Azure AI services require:",
options: ["API key","Endpoint URL","Local GPU","Azure subscription"],
correct: [0,1,3]
},
{
q: "18. Knowledge Mining uses:",
options: ["Cognitive Search","AI enrichment","Indexers","Manual sorting only"],
correct: [0,1,2]
},
{
q: "19. Speech Service supports:",
options: ["Real-time transcription","Batch transcription","Custom speech models","Database hosting"],
correct: [0,1,2]
},
{
q: "20. Text Analytics for Health extracts:",
options: ["Medical conditions","Medications","Healthcare entities","Video metadata"],
correct: [0,1,2]
}
];

const container = document.getElementById("questions");

// Generate questions
quizData.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "question";
    div.id = "qbox" + index;
    div.innerHTML = `<p>${item.q}</p>`;
    item.options.forEach((option, i) => {
        div.innerHTML += `<input type="checkbox" name="q${index}" value="${i}"> ${option}<br>`;
    });
    container.appendChild(div);
});

// Submit handling
document.getElementById("quizForm").addEventListener("submit", function(e){
    e.preventDefault();
    submitQuiz();
});

function submitQuiz(){
    clearInterval(timer);
    let score = 0;

    quizData.forEach((item, index) => {

        let selected = Array.from(document.querySelectorAll(`input[name="q${index}"]:checked`))
            .map(el => parseInt(el.value))
            .sort();

        let correct = item.correct.slice().sort();
        let box = document.getElementById("qbox"+index);

        if(JSON.stringify(selected) === JSON.stringify(correct)){
            score++;
            box.classList.add("correct");
        } else {
            box.classList.add("wrong");
        }
    });

    let percentage = (score / quizData.length) * 100;
    let grade = percentage >= 50 ? "PASS" : "FAIL";
    let gradeClass = percentage >= 50 ? "pass" : "fail";

    document.getElementById("result").innerHTML =
        "Score: " + score + " / " + quizData.length +
        "<br>Percentage: " + percentage.toFixed(2) + "%" +
        "<br><span class='" + gradeClass + "'>Result: " + grade + "</span>";
}

</script>

</body>
</html>
